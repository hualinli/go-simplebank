version: "2"
sql:
  - engine: "postgresql"
    queries: "db/query/"
    schema: "db/migrations/"
    gen:
      go:
        package: "db"
        out: "db/sqlc/"
        sql_package: "pgx/v5"
        emit_db_tags: true
        emit_empty_slices: true
        emit_interface: true
        overrides:
          - column: "sessions.session_id"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - column: "sessions.expires_at"
            go_type:
              import: "time"
              type: "Time"
          - column: "sessions.created_at"
            go_type:
              import: "time"
              type: "Time"
          - column: "sessions.updated_at"
            go_type:
              import: "time"
              type: "Time"